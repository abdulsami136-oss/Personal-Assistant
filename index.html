<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Assistant</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #000b1e; /* deep dark blue */
      color: #f9f9f9; /* off white */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      color: #f5f5f5;
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 30px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    input {
      width: 320px;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #001633;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.15);
    }

    input::placeholder {
      color: #d8d8d8;
    }

    button {
      background: #003366;
      color: #f8f8f8;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      margin: 5px;
    }

    button:hover {
      background: #004080;
      box-shadow: 0 0 10px rgba(0, 64, 128, 0.6);
    }

    p {
      font-size: 1.1rem;
      margin-top: 30px;
      color: #e0e0e0;
    }

    #response {
      display: block;
      margin-top: 10px;
      color: #ffffff;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    #micButton {
      background: #004080;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-size: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      color: #fff;
    }

    #micButton.listening {
      background: #ff4d4d;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PERSONAL ASSISTANT</h1>

    <input type="text" id="command" placeholder="Type your command here..." />
    <div>
      <button onclick="sendCommand()">Send</button>
      <button id="micButton" onclick="startVoiceInput()">🎤</button>
    </div>

    <p><b>Response:</b> <span id="response"></span></p>
  </div>

  <script>
    async function sendCommand() {
      const command = document.getElementById('command').value.trim();
      const responseField = document.getElementById('response');
      
      if (!command) {
        responseField.textContent = "Please enter a command.";
        return;
      }

      responseField.textContent = "Thinking...";

      try {
        const res = await fetch("/process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command })
        });

        const data = await res.json();
        responseField.textContent = data.response;
      } catch (error) {
        responseField.textContent = "Error connecting to server.";
        console.error(error);
      }
    }

    // 🎤 Voice input using browser speech recognition
    function startVoiceInput() {
      const micButton = document.getElementById("micButton");
      const responseField = document.getElementById("response");

      if (!('webkitSpeechRecognition' in window)) {
        alert("Sorry, your browser does not support voice input.");
        return;
      }

      const recognition = new webkitSpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onstart = () => {
        micButton.classList.add("listening");
        responseField.textContent = "Listening...";
      };

      recognition.onresult = (event) => {
        const command = event.results[0][0].transcript;
        document.getElementById("command").value = command;
        responseField.textContent = `You said: "${command}"`;
        micButton.classList.remove("listening");
        sendCommand();
      };

      recognition.onerror = (event) => {
        console.error(event.error);
        responseField.textContent = "Voice recognition error.";
        micButton.classList.remove("listening");
      };

      recognition.onend = () => {
        micButton.classList.remove("listening");
      };

      recognition.start();
    }
  </script>
</body>
</html>
